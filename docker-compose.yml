services:
  postgres:
    image: postgres:16-alpine
    container_name: stratapay_postgres
    environment:
      POSTGRES_USER: stratapay_user
      POSTGRES_PASSWORD: stratapay_password
      POSTGRES_DB: stratapay_ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratapay_user -d stratapay_ledger"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
volumes:
  pgdata: